<!DOCTYPE html>
<html>
<head>
    <title>FoodSonic Express - Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background-color: #8B2500;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image: url('logoo.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(60, 10, 0, 0.60);
            z-index: 1;
        }

        .logo-top {
            position: absolute;
            top: 22px;
            left: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
            z-index: 10;
        }

        .logo-img-wrap {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .logo-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .brand-name {
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
            color: #FFD580;
            line-height: 1.1;
        }

        .brand-sub {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.75);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 550px;
            padding: 20px;
        }

        .card {
            background: rgba(255,250,240,0.97);
            border-radius: 32px;
            padding: 42px 50px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.5);
            color: #3a1a00;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #E8451A, #FF8C00, #FFD580, #FF8C00, #E8451A);
        }

        .logo-circle {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: #FFF3E0;
            border: 3px solid #FFD580;
            margin: 0 auto 18px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(232,69,26,0.2);
            font-size: 2.8rem;
        }

        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }

        h2 {
            text-align: center;
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: #E8451A;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #9b6a3a;
            font-size: 0.88rem;
            margin-bottom: 28px;
            font-weight: 700;
        }

        .input-group { position: relative; margin-bottom: 16px; }

        .input-group i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%);
            color: #E8451A; font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: #FFF8F0;
            border: 2px solid #FFD5B0;
            border-radius: 12px;
            color: #3a1a00;
            font-family: 'Nunito', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
        }

        .input-group input::placeholder { color: #c9956a; font-weight: 400; }
        .input-group input:focus {
            border-color: #E8451A;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(232,69,26,0.1);
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #E8451A 0%, #FF7043 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.15rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 6px;
            box-shadow: 0 6px 20px rgba(232,69,26,0.35);
        }

        .btn-main:hover {
            background: linear-gradient(135deg, #cc3a14 0%, #e85e30 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(232,69,26,0.45);
        }

        .bottom-link {
            text-align: center; margin-top: 20px;
            color: #9b6a3a; font-size: 0.87rem; font-weight: 600;
        }

        .bottom-link a { color: #E8451A; font-weight: 800; text-decoration: none; }
        .bottom-link a:hover { text-decoration: underline; }

        .error-msg {
            background: rgba(220,53,69,0.1);
            color: #c0392b;
            border: 1px solid rgba(220,53,69,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
            font-weight: 700;
        }

        .hint {
            text-align: center;
            font-size: 0.75rem;
            color: #b07040;
            background: #FFF3E0;
            border-radius: 8px;
            padding: 8px;
            margin-top: 14px;
            font-weight: 600;
        }
    </style>
    <script src="config.js"></script>
</head>
<body>

<div class="bg-pattern"></div>
<div class="bg-overlay"></div>

<a href="login.html" class="logo-top">
    <div class="logo-img-wrap">
        <img src="logoo.jpg" alt="Logo" onerror="this.parentElement.innerHTML='🍕'">
    </div>
    <div>
        <div class="brand-name">FoodSonic</div>
        <div class="brand-sub">Express</div>
    </div>
</a>

<div class="container">
    <div class="card">
        <div class="logo-circle">
            <img src="logoo.jpg" alt="Logo"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
            <span style="display:none">🍕</span>
        </div>

        <h2>Welcome Back!</h2>
        <p class="subtitle">🍔 Log in to order your favorites</p>

        <div class="error-msg" id="errorMsg"><i class="fa fa-circle-exclamation"></i> Invalid email or password.</div>

        <div class="input-group">
            <i class="fa fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Email address" required>
        </div>
        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="Password" required>
        </div>

        <button class="btn-main" onclick="login()">
            <i class="fa fa-right-to-bracket"></i> &nbsp;LOGIN
        </button>

        <div class="bottom-link">
            Don't have an account? <a href="signup.html">Sign up here</a>
        </div>
        <div class="hint">💡 Register first, then log in to start ordering!</div>
    </div>
</div>

<script>
async function login() {
    const email    = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errEl    = document.getElementById("errorMsg");
    const btn      = document.querySelector(".btn-main");

    errEl.style.display = "none";

    if (!email || !password) {
        errEl.style.display = "block"; return;
    }

    btn.disabled  = true;
    btn.innerText = "Logging in...";

    try {
        const res  = await fetch(`${API_BASE_URL}api/login.php`, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
            // Store user info in sessionStorage (no password stored)
            sessionStorage.setItem("loggedIn",  "true");
            sessionStorage.setItem("userId",    data.userId);
            sessionStorage.setItem("userName",  data.fullname);
            sessionStorage.setItem("userEmail", data.email);
            window.location.href = "index.html";
        } else {
            errEl.style.display = "block";
            btn.disabled  = false;
            btn.innerHTML = '<i class="fa fa-right-to-bracket"></i> &nbsp;LOGIN';
        }
    } catch (err) {
        errEl.innerText = "⚠️ Cannot connect to server. Make sure XAMPP is running.";
        errEl.style.display = "block";
        btn.disabled  = false;
        btn.innerHTML = '<i class="fa fa-right-to-bracket"></i> &nbsp;LOGIN';
    }
}

if (sessionStorage.getItem("loggedIn") === "true") {
    window.location.href = "index.html";
}
</script>
</body>
</html>
